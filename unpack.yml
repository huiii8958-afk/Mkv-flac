name: Unpack ZIP

# Запускается вручную с вкладки Actions
on:
  workflow_dispatch:

jobs:
  unpack:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # нужно, чтобы запушить обратно изменения
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unpack ZIP and restructure
        run: |
          set -e

          if [ ! -f mkv-flac-player.zip ]; then
            echo "ОШИБКА: mkv-flac-player.zip не найден в корне репо"
            ls -la
            exit 1
          fi

          # Распаковываем во временную папку
          mkdir -p tmp_extract
          unzip -q mkv-flac-player.zip -d tmp_extract
          echo "После распаковки:"
          ls -la tmp_extract/

          # Удаляем всё в репо кроме .git и tmp_extract
          # (включая сам этот workflow — после коммита он исчезнет, это норма)
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name 'tmp_extract' \
            -exec rm -rf {} +

          # Переносим содержимое распакованной папки в корень
          # dotglob чтобы захватить .gitignore, .github и т.п.
          shopt -s dotglob
          if [ -d tmp_extract/mkv-flac-player ]; then
            mv tmp_extract/mkv-flac-player/* .
            rmdir tmp_extract/mkv-flac-player
          else
            # На случай если ZIP без верхней папки
            mv tmp_extract/* .
          fi
          rmdir tmp_extract

          echo "Итоговая структура корня:"
          ls -la

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Нечего коммитить"
            exit 0
          fi
          git commit -m "Unpack ZIP: restructure repo to file tree"
          git push
