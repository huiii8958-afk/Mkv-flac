name: Unpack ZIP

on:
  workflow_dispatch:

jobs:
  unpack:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract ZIP
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "::error::ZIP not found"
            exit 1
          fi
          mkdir -p extracted
          unzip -o "$ZIP_FILE" -d extracted

      - name: Move files
        run: |
          if [ -d extracted/mkv-flac-player ]; then
            shopt -s dotglob
            mv extracted/mkv-flac-player/* .
          fi

      - name: Cleanup
        run: |
          rm -rf extracted *.zip .github.backup || true

      - name: Commit
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Unpack project" || echo "No changes"
          git push

      - name: Delete self
        run: |
          git rm .github/workflows/unpack.yml || true
          git commit -m "Remove unpack" || true
          git push || true