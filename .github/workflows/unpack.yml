name: Unpack ZIP

on:
  workflow_dispatch:

jobs:
  unpack:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find ZIP file
        id: find_zip
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in root"
            exit 1
          fi
          echo "zip_file=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "Found: $ZIP_FILE"

      - name: Extract ZIP
        run: |
          ZIP_FILE="${{ steps.find_zip.outputs.zip_file }}"
          echo "Extracting $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d extracted/

      - name: Move files to root
        run: |
          if [ -d "extracted/mkv-flac-player" ]; then
            echo "Moving from mkv-flac-player/ folder"
            shopt -s dotglob
            mv extracted/mkv-flac-player/* .
            rmdir extracted/mkv-flac-player || true
          elif [ -d "extracted/app" ]; then
            echo "Moving files directly"
            shopt -s dotglob
            mv extracted/* .
          else
            echo "Unknown structure, listing extracted:"
            ls -la extracted/
            exit 1
          fi

      - name: Remove ZIP and cleanup
        run: |
          rm -f *.zip || true
          rm -rf extracted/ || true

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Unpack project from ZIP and clean up"
            git push
          fi

      - name: Delete this workflow file
        run: |
          git rm .github/workflows/unpack.yml || true
          git commit -m "Remove unpack workflow" || true
          git push || true