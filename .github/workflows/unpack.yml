name: Unpack ZIP

on:
  workflow_dispatch:

jobs:
  unpack:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract
        run: |
          ZIP=$(find . -maxdepth 1 -name "*.zip" | head -1)
          unzip -o "$ZIP"
          rm "$ZIP"

      - name: Move if needed
        run: |
          if [ -d mkv-flac-player ]; then
            shopt -s dotglob
            mv mkv-flac-player/* .
            rmdir mkv-flac-player
          fi

      - name: Commit
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Unpack" || echo "No changes"
          git push